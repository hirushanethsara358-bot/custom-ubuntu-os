name: Build Custom Apple-Style Ubuntu ISO

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso genisoimage rsync wget curl

      - name: Download Base Ubuntu ISO
        run: |
          echo "Finding and downloading latest Ubuntu 24.04 Live Server ISO..."
          ISO_URL=$(curl -s https://releases.ubuntu.com/24.04/ | grep -oE "ubuntu-24\.04[^\"']+-live-server-amd64\.iso" | head -n 1)
          if [ -z "$ISO_URL" ]; then
            ISO_URL="https://releases.ubuntu.com/24.04/ubuntu-24.04.4-live-server-amd64.iso"
          else
            ISO_URL="https://releases.ubuntu.com/24.04/$ISO_URL"
          fi
          echo "Downloading from: $ISO_URL"
          wget -O /tmp/ubuntu.iso "$ISO_URL"
          
          # Move to builder directory
          mkdir -p ubuntu-builder/work
          mv /tmp/ubuntu.iso ubuntu-builder/ubuntu.iso

      - name: Run Build & Customization
        run: |
          cd ubuntu-builder
          chmod +x build.sh macos-customize.sh apple-deep-customizer.sh pack.sh
          
          # Run extraction
          ./build.sh
          
          # Apply macOS customizations inside chroot
          sudo cp macos-customize.sh apple-deep-customizer.sh work/squashfs-root/tmp/
          sudo chroot work/squashfs-root /tmp/macos-customize.sh
          sudo chroot work/squashfs-root /tmp/apple-deep-customizer.sh
          
          # Pack final ISO
          ./pack.sh

      - name: Upload Custom ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-apple-ubuntu-iso
          path: ubuntu-builder/output/custom-ubuntu.iso
          retention-days: 7
