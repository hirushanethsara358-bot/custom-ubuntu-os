name: Custom Ubuntu Builder CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso genisoimage rsync

      - name: Verify scripts
        run: |
          chmod +x build.sh pack.sh
          echo "Builder scripts verified successfully."
